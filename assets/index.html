<!DOCTYPE html>

<head>

    <aside>

    <main id="Galeria">
        <div class="cards">
                <!---Mobile-->
                <div class="cardstop">
                    <div class="cardmobi">
                    <img class="maravilla1" src="./img/SaltoAngel.jpg" alt="Salto Angel">
                    <div class="overlay">
                    <p>Salto Angel</p>
                     <button>Ver más</button>
                     </div>
                </div>
                    <!---Tablet-->
                    <div class="cardTablet">
                    <img class="maravilla2" src="./img/torrepisa.jpg" alt="Torre Pisa">
                    <div class="overlay">
                    <p>Torre Pisa Roma</p>
                     <button>Ver más</button> 
                    </div>
                    </div>
                    <!---Desktop-->
                    <div class="cardDesk">
                    <img class="maravilla3" src="./img/tajmahal.jpg" alt="Taj Mahal">

                    <p>Taj Mahal</p>    
                     <button>Ver más</button>                 
                    </div>                                        
                    </div>

                    <div class="cardDesk">
                    <img class="maravilla4" src="./img/piramide.jpg" alt="Piramides Egipto">

                    <p>Piramides Egipto</p>     
                     <button>Ver más</button>                
                    </div>                     
                    </div>
                </div>

                <div class="cardsbottom">
                    <div class="cardDesk">
                    <img class="maravilla5" src="./img/Eiffel.jpg" alt="Torre Eiffel">
                    <div class="overlay">
                    <p>Torre Eiffel</p>
                     <button>Ver más</button>                   
                    </div> 

                    </div>
                    <div class="cardDesk">
                    <img class="maravilla6" src="./img/muralla.jpg" alt="Gran Muralla China">

                    <p>Gran Muralla China</p>     
                     <button>Ver más</button>              
                    </div> 
                    </div>   

                    <div class="cardDesk">
                    <img class="maravilla7" src="./img/coliseo.jpg" alt="Coliseo Roma">
                    <div class="overlay">
                    <p> Coliseo Roma</p> 
                     <button>Ver más</button>                  
                    </div> 
                    </div> 

                    <div class="cardDesk">
                    <img class="maravilla8" src="./img/machupichu.jpg" alt="Machu Pichu">
                    <div class="overlay">
                    <p> Machu Pichu</p> 
                     <button>Ver más</button>                  
                    </div> 
                    </div>
