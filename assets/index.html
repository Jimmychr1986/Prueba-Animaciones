<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://kit.fontawesome.com/db258a1787.js" crossorigin="anonymous"></script>
     <title>Maravillas del Mundo</title>
</head>
<body>
    <aside>
        
        <div class="aside2">
            <h1>Maravillas del Mundo</h1>
        </div>
        <menu>
            <p>Inicio</p>
            <p>Historia</p>
            <p>Ubicaciones</p>
        </menu>
    </aside>

    <main>
        <div class="cards">
                <!---Mobile-->
                <div class="cardstop">
                    <div class="cardmobi">
                    <img class="maravilla1" src="./img/SaltoAngel.jpg" alt="Salto Angel">
                    <br><p>Salto Angel</p>
                     <button>Ver más</button>
                </div>
                    <!---Tablet-->
                    <div class="cardTablet">
                    <img class="maravilla2" src="./img/torrepisa.jpg" alt="Torre Pisa">
                    <br><p>Torre Pisa Roma</p>
                     <button>Ver más</button> 
                    </div>
                    <!---Desktop-->
                    <div class="cardDesk">
                    <img class="maravilla3" src="./img/tajmahal.jpg" alt="Taj Mahal">
                    <br><p>Taj Mahal</p>
                     <button>Ver más</button>                       
                    </div>

                    <div class="cardDesk">
                    <img class="maravilla4" src="./img/piramide.jpg" alt="Piramides Egipto">
                    <br><p>Piramides Egipto</p>
                     <button>Ver más</button> 
                    </div>
                </div>

                <div class="cardsbottom">
                    <div class="cardDesk">
                    <img class="maravilla5" src="./img/Eiffel.jpg" alt="Torre Eiffel">
                    <br><p>Torre Eiffel</p>
                     <button>Ver más</button> 

                    </div>
                    <div class="cardDesk">
                    <img class="maravilla6" src="./img/muralla.jpg" alt="Gran Muralla China">
                    <br><p>Gran Muralla China</p>
                     <button>Ver más</button> 
                    </div>   

                    <div class="cardDesk">
                    <img class="maravilla7" src="./img/coliseo.jpg" alt="Coliseo Roma">
                    <br><p> Coliseo Roma</p>
                     <button>Ver más</button> 
                    </div> 

                    <div class="cardDesk">
                    <img class="maravilla8" src="./img/machupichu.jpg" alt="Machu Pichu">
                    <br><p> Machu Pichu</p>
                     <button>Ver más</button> 
                    </div> 
                </div>
        </div>

        <div class="pagination">
            <a href="#">&laquo;</a>
